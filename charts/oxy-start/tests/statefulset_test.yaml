suite: statefulset tests
templates:
  - statefulset.yaml

tests:
  # =======================
  # Basic StatefulSet Tests
  # =======================

  - it: should create a StatefulSet with correct metadata
    asserts:
      - isKind:
          of: StatefulSet
      - equal:
          path: metadata.name
          value: RELEASE-NAME-oxy-start
      - equal:
          path: metadata.labels["app.kubernetes.io/name"]
          value: oxy-start
      - equal:
          path: metadata.labels["app.kubernetes.io/instance"]
          value: RELEASE-NAME

  - it: should configure StatefulSet with correct defaults
    asserts:
      - equal:
          path: spec.serviceName
          value: RELEASE-NAME-oxy-start-headless
      - equal:
          path: spec.replicas
          value: 1
      - equal:
          path: spec.template.spec.containers[0].name
          value: oxy-start

  # =======================
  # Container Configuration
  # =======================

  - it: should configure main container correctly
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: "ghcr.io/oxy-hq/oxy:0.5.33"
      - contains:
          path: spec.template.spec.containers[0].ports
          content:
            containerPort: 3000
            protocol: TCP
            name: traffic-port

  - it: should only expose main port by default
    asserts:
      - lengthEqual:
          path: spec.template.spec.containers[0].ports
          count: 1
      - equal:
          path: spec.template.spec.containers[0].ports[0].name
          value: traffic-port

  # =======================
  # DinD Sidecar Tests
  # =======================

  - it: should deploy DinD sidecar by default
    asserts:
      - lengthEqual:
          path: spec.template.spec.containers
          count: 2
      - equal:
          path: spec.template.spec.containers[0].name
          value: oxy-start
      - equal:
          path: spec.template.spec.containers[1].name
          value: dind

  - it: should configure DinD container correctly
    asserts:
      - equal:
          path: spec.template.spec.containers[1].image
          value: "docker:27-dind"
      - equal:
          path: spec.template.spec.containers[1].securityContext.privileged
          value: true
      - contains:
          path: spec.template.spec.containers[1].ports
          content:
            containerPort: 2375
            protocol: TCP
            name: docker

  # =======================
  # Internal Port Tests
  # =======================

  - it: should not include local flag when git is disabled
    set:
      git:
        enabled: false
    asserts:
      - notMatchRegex:
          path: spec.template.spec.containers[0].command[2]
          pattern: ".*--local.*"
      - notMatchRegex:
          path: spec.template.spec.containers[0].command[2]
          pattern: ".*--cloud.*"

  - it: should not include internal port flags by default
    set:
      git:
        enabled: false
    asserts:
      - notMatchRegex:
          path: spec.template.spec.containers[0].command[2]
          pattern: ".*--internal-host.*"
      - notMatchRegex:
          path: spec.template.spec.containers[0].command[2]
          pattern: ".*--internal-port.*"

  - it: should expose internal container port when internalHost is set
    set:
      app:
        internalHost: "0.0.0.0"
        internalPort: 3001
    asserts:
      - lengthEqual:
          path: spec.template.spec.containers[0].ports
          count: 2
      - contains:
          path: spec.template.spec.containers[0].ports
          content:
            containerPort: 3000
            protocol: TCP
            name: traffic-port
      - contains:
          path: spec.template.spec.containers[0].ports
          content:
            containerPort: 3001
            protocol: TCP
            name: internal-port

  - it: should include internal port flags in command when enabled
    set:
      git:
        enabled: false
      app:
        internalHost: "0.0.0.0"
        internalPort: 3001
    asserts:
      - matchRegex:
          path: spec.template.spec.containers[0].command[2]
          pattern: ".*--internal-host 0\\.0\\.0\\.0.*"
      - matchRegex:
          path: spec.template.spec.containers[0].command[2]
          pattern: ".*--internal-port 3001.*"

  - it: should support custom internal host and port
    set:
      git:
        enabled: false
      app:
        internalHost: "127.0.0.1"
        internalPort: 8001
    asserts:
      - lengthEqual:
          path: spec.template.spec.containers[0].ports
          count: 2
      - contains:
          path: spec.template.spec.containers[0].ports
          content:
            containerPort: 8001
            protocol: TCP
            name: internal-port
      - matchRegex:
          path: spec.template.spec.containers[0].command[2]
          pattern: ".*--internal-host 127\\.0\\.0\\.1.*"
      - matchRegex:
          path: spec.template.spec.containers[0].command[2]
          pattern: ".*--internal-port 8001.*"

  # =======================
  # Git Pull (repo exists) Tests
  # =======================

  - it: should pull latest changes when repo exists (no auth)
    set:
      git:
        enabled: true
        repository: "git@github.com:example/repo.git"
      persistence:
        enabled: true
    asserts:
      - matchRegex:
          path: spec.template.spec.initContainers[1].command[2]
          pattern: ".*git fetch origin.*"
      - matchRegex:
          path: spec.template.spec.initContainers[1].command[2]
          pattern: ".*git reset --hard FETCH_HEAD.*"

  - it: should update remote url and pull when repo exists with http auth
    set:
      git:
        enabled: true
        repository: "https://github.com/example/repo.git"
      httpAuth:
        username: "user"
        password: "pass"
      persistence:
        enabled: true
    asserts:
      - matchRegex:
          path: spec.template.spec.initContainers[1].command[2]
          pattern: ".*git remote set-url origin.*"
      - matchRegex:
          path: spec.template.spec.initContainers[1].command[2]
          pattern: ".*git fetch origin.*"
      - matchRegex:
          path: spec.template.spec.initContainers[1].command[2]
          pattern: ".*git reset --hard FETCH_HEAD.*"

  - it: should update remote url and pull when repo exists with github app auth
    set:
      git:
        enabled: true
        repository: "https://github.com/example/repo.git"
        githubApp:
          privateKey: "pem-key"
          applicationId: "123"
          installationId: "456"
      persistence:
        enabled: true
    asserts:
      - matchRegex:
          path: spec.template.spec.initContainers[1].command[2]
          pattern: ".*git remote set-url origin.*"
      - matchRegex:
          path: spec.template.spec.initContainers[1].command[2]
          pattern: ".*git fetch origin.*"
      - matchRegex:
          path: spec.template.spec.initContainers[1].command[2]
          pattern: ".*git reset --hard FETCH_HEAD.*"

  - it: should pull latest changes when repo exists with ssh auth
    set:
      git:
        enabled: true
        repository: "git@github.com:example/repo.git"
      sshKey:
        privateKey: "fake-key"
      persistence:
        enabled: true
    asserts:
      - matchRegex:
          path: spec.template.spec.initContainers[1].command[2]
          pattern: ".*git fetch origin.*"
      - matchRegex:
          path: spec.template.spec.initContainers[1].command[2]
          pattern: ".*git reset --hard FETCH_HEAD.*"

  - it: should work with both git clone and internal port
    set:
      git:
        enabled: true
        repository: "git@github.com:example/repo.git"
      app:
        internalHost: "0.0.0.0"
        internalPort: 3001
      persistence:
        enabled: true
    asserts:
      - matchRegex:
          path: spec.template.spec.containers[0].command[2]
          pattern: ".*--local.*"
      - matchRegex:
          path: spec.template.spec.containers[0].command[2]
          pattern: ".*--internal-host 0\\.0\\.0\\.0.*"
      - matchRegex:
          path: spec.template.spec.containers[0].command[2]
          pattern: ".*--internal-port 3001.*"
      - contains:
          path: spec.template.spec.containers[0].ports
          content:
            containerPort: 3001
            protocol: TCP
            name: internal-port

  - it: should work with DinD and internal port together
    set:
      dind:
        enabled: true
      app:
        internalHost: "0.0.0.0"
        internalPort: 3001
    asserts:
      - lengthEqual:
          path: spec.template.spec.containers
          count: 2
      - equal:
          path: spec.template.spec.containers[0].name
          value: oxy-start
      - equal:
          path: spec.template.spec.containers[1].name
          value: dind
      - contains:
          path: spec.template.spec.containers[0].ports
          content:
            containerPort: 3001
            protocol: TCP
            name: internal-port
      - matchRegex:
          path: spec.template.spec.containers[0].command[2]
          pattern: ".*--internal-host 0\\.0\\.0\\.0.*"

  # =======================
  # Environment Variables
  # =======================

  - it: should set default environment variables
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: OXY_STATE_DIR
            value: "/workspace/oxy_data"

  - it: should set DOCKER_HOST when DinD is enabled
    set:
      dind:
        enabled: true
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: DOCKER_HOST
            value: "unix:///var/run/docker.sock"

  # =======================
  # Resource Configuration
  # =======================

  - it: should set default resource limits for main container
    asserts:
      - equal:
          path: spec.template.spec.containers[0].resources.requests.cpu
          value: 250m
      - equal:
          path: spec.template.spec.containers[0].resources.requests.memory
          value: 512Mi
      - equal:
          path: spec.template.spec.containers[0].resources.limits.cpu
          value: 1000m
      - equal:
          path: spec.template.spec.containers[0].resources.limits.memory
          value: 2Gi

  - it: should set default resource limits for DinD container
    asserts:
      - equal:
          path: spec.template.spec.containers[1].resources.requests.cpu
          value: 500m
      - equal:
          path: spec.template.spec.containers[1].resources.requests.memory
          value: 1Gi
      - equal:
          path: spec.template.spec.containers[1].resources.limits.cpu
          value: 2000m
      - equal:
          path: spec.template.spec.containers[1].resources.limits.memory
          value: 4Gi

  # =======================
  # Persistence & Volumes
  # =======================

  - it: should configure workspace volume claim template
    asserts:
      - equal:
          path: spec.volumeClaimTemplates[0].metadata.name
          value: workspace
      - equal:
          path: spec.volumeClaimTemplates[0].spec.resources.requests.storage
          value: 20Gi

  - it: should configure DinD storage volume claim template
    asserts:
      - equal:
          path: spec.volumeClaimTemplates[1].metadata.name
          value: dind-storage
      - equal:
          path: spec.volumeClaimTemplates[1].spec.resources.requests.storage
          value: 40Gi

  - it: should omit workspace volumeClaimTemplate when persistence is disabled
    set:
      persistence:
        enabled: false
    asserts:
      - lengthEqual:
          path: spec.volumeClaimTemplates
          count: 1
      - equal:
          path: spec.volumeClaimTemplates[0].metadata.name
          value: dind-storage

  - it: should add emptyDir workspace volume when persistence is disabled
    set:
      persistence:
        enabled: false
    asserts:
      - contains:
          path: spec.template.spec.volumes
          content:
            name: workspace
            emptyDir: {}

  - it: should mount extraVolumes into the pod
    set:
      extraVolumes:
        - name: s3files
          persistentVolumeClaim:
            claimName: my-s3files-pvc
    asserts:
      - contains:
          path: spec.template.spec.volumes
          content:
            name: s3files
            persistentVolumeClaim:
              claimName: my-s3files-pvc

  - it: should add extraVolumeMounts to the main container
    set:
      extraVolumeMounts:
        - name: s3files
          mountPath: /workspace/oxy_data
    asserts:
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: s3files
            mountPath: /workspace/oxy_data

  - it: should support extraVolumes and extraVolumeMounts together with persistence disabled
    set:
      persistence:
        enabled: false
      extraVolumes:
        - name: oxy-state-s3files
          persistentVolumeClaim:
            claimName: oxy-start-s3files-pvc
      extraVolumeMounts:
        - name: oxy-state-s3files
          mountPath: /workspace/oxy_data
    asserts:
      - contains:
          path: spec.template.spec.volumes
          content:
            name: workspace
            emptyDir: {}
      - contains:
          path: spec.template.spec.volumes
          content:
            name: oxy-state-s3files
            persistentVolumeClaim:
              claimName: oxy-start-s3files-pvc
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: oxy-state-s3files
            mountPath: /workspace/oxy_data
      - lengthEqual:
          path: spec.volumeClaimTemplates
          count: 1
      - equal:
          path: spec.volumeClaimTemplates[0].metadata.name
          value: dind-storage
