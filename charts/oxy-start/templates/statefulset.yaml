{{/*
Define git clone paths
*/}}
{{- $gitCloneDir := printf "%s/%s" .Values.persistence.mountPath (default "repo" .Values.git.cloneDir) -}}
{{- $workingDir := $gitCloneDir -}}
{{- if and .Values.git.workingDir (ne .Values.git.workingDir "") -}}
  {{- $workingDir = printf "%s/%s" $gitCloneDir .Values.git.workingDir -}}
{{- end -}}

apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "oxy-start.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "oxy-start.labels" . | nindent 4 }}
    version: v1
spec:
  serviceName: {{ include "oxy-start.fullname" . }}-headless
  replicas: 1
  {{- if gt (int (.Values.minReadySeconds | default 0)) 0 }}
  minReadySeconds: {{ .Values.minReadySeconds }}
  {{- end }}
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      partition: 0
  selector:
    matchLabels:
      {{- include "oxy-start.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "oxy-start.selectorLabels" . | nindent 8 }}
        version: v1
    spec:
      {{- $sa := include "oxy-start.serviceAccountName" . }}
      {{- if ne $sa "" }}
      serviceAccountName: {{ $sa | quote }}
      {{- end }}
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds }}
      securityContext:
        fsGroup: {{ .Values.securityContext.fsGroup }}

      {{- if or .Values.dind.enabled .Values.git.enabled .Values.extraInitContainers }}
      initContainers:
        {{- if .Values.dind.enabled }}
        # Copy the docker CLI binary into a shared volume so the oxy container
        # can talk to the DinD daemon without needing docker in its own image.
        - name: docker-cli-install
          image: "{{ .Values.dind.image }}:{{ .Values.dind.imageTag }}"
          imagePullPolicy: {{ .Values.dind.imagePullPolicy }}
          command: ['cp', '/usr/local/bin/docker', '/docker-bin/docker']
          volumeMounts:
            - name: docker-bin
              mountPath: /docker-bin
        {{- end }}

        {{- if .Values.git.enabled }}
        # Git Clone Init Container — performs a shallow clone on first run
        - name: git-clone
          image: "{{ .Values.git.image }}:{{ .Values.git.imageTag }}"
          imagePullPolicy: {{ .Values.git.imagePullPolicy }}
          env:
            - name: GIT_REPO
              value: {{ .Values.git.repository | quote }}
            - name: GIT_BRANCH
              value: {{ .Values.git.branch | quote }}
            - name: CLONE_DIR
              value: {{ $gitCloneDir | quote }}
            {{- if .Values.httpAuth.username }}
            - name: GIT_USERNAME
              value: {{ .Values.httpAuth.username | quote }}
            {{- end }}
          command:
            - sh
            - -c
            - |
              set -e

              {{- if or .Values.git.githubApp.secretName (and .Values.git.githubApp.privateKey .Values.git.githubApp.applicationId .Values.git.githubApp.installationId) }}
              # GitHub App authentication — generate an installation access token
              apk add --no-cache curl openssl > /dev/null

              APP_ID=$(cat /etc/github-app/{{ .Values.git.githubApp.applicationIdKey }})
              INSTALL_ID=$(cat /etc/github-app/{{ .Values.git.githubApp.installationIdKey }})

              NOW=$(date +%s)
              IAT=$((NOW - 60))
              EXP=$((NOW + 600))
              HEADER=$(printf '{"alg":"RS256","typ":"JWT"}' | openssl base64 -A | tr -d '=' | tr '/+' '_-')
              PAYLOAD=$(printf '{"iat":%d,"exp":%d,"iss":"%s"}' "$IAT" "$EXP" "$APP_ID" | openssl base64 -A | tr -d '=' | tr '/+' '_-')
              SIG=$(printf '%s.%s' "$HEADER" "$PAYLOAD" | openssl dgst -sha256 -sign /etc/github-app/{{ .Values.git.githubApp.privateKeyKey }} -binary | openssl base64 -A | tr -d '=' | tr '/+' '_-')
              JWT="${HEADER}.${PAYLOAD}.${SIG}"

              RESPONSE=$(curl -s -X POST \
                "https://api.github.com/app/installations/${INSTALL_ID}/access_tokens" \
                -H "Authorization: Bearer $JWT" \
                -H "Accept: application/vnd.github+json" \
                -H "X-GitHub-Api-Version: 2022-11-28")

              TOKEN=$(printf '%s' "$RESPONSE" | sed -n 's/.*"token"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' | head -1)

              if [ -z "$TOKEN" ]; then
                echo "Error: failed to obtain GitHub App installation token"
                echo "GitHub API response: $RESPONSE"
                exit 1
              fi

              REPO_URL=$(echo "$GIT_REPO" | sed "s|https://github.com/|https://x-access-token:${TOKEN}@github.com/|")

              if [ -d "$CLONE_DIR/.git" ]; then
                echo "Repository already exists at $CLONE_DIR, pulling latest changes"
                cd "$CLONE_DIR"
                git remote set-url origin "$REPO_URL"
                git fetch origin "$GIT_BRANCH"
                git reset --hard FETCH_HEAD
              else
                mkdir -p "$CLONE_DIR"
                git clone --branch "$GIT_BRANCH" --depth 1 "$REPO_URL" "$CLONE_DIR"
              fi

              {{- else if .Values.httpAuth.username }}
              # HTTP authentication
              GIT_PASSWORD=$(cat /etc/git-auth/password)
              REPO_URL=$(echo "$GIT_REPO" | sed "s|https://|https://${GIT_USERNAME}:${GIT_PASSWORD}@|")

              if [ -d "$CLONE_DIR/.git" ]; then
                echo "Repository already exists at $CLONE_DIR, pulling latest changes"
                cd "$CLONE_DIR"
                git remote set-url origin "$REPO_URL"
                git fetch origin "$GIT_BRANCH"
                git reset --hard FETCH_HEAD
              else
                mkdir -p "$CLONE_DIR"
                git clone --branch "$GIT_BRANCH" --depth 1 "$REPO_URL" "$CLONE_DIR"
              fi

              {{- else if or .Values.sshKey.privateKey .Values.sshKey.secretName }}
              # SSH key authentication
              mkdir -p /root/.ssh
              chmod 700 /root/.ssh
              cp /etc/git-secret/ssh /root/.ssh/id_rsa
              chmod 600 /root/.ssh/id_rsa
              if [ -f /etc/git-secret/known_hosts ]; then
                cp /etc/git-secret/known_hosts /root/.ssh/known_hosts
                chmod 644 /root/.ssh/known_hosts
              else
                touch /root/.ssh/known_hosts
                HOSTNAME=$(echo "$GIT_REPO" | sed 's|.*@\([^:/]*\)[:/].*|\1|')
                ssh-keyscan -H "$HOSTNAME" >> /root/.ssh/known_hosts 2>/dev/null || true
              fi

              if [ -d "$CLONE_DIR/.git" ]; then
                echo "Repository already exists at $CLONE_DIR, pulling latest changes"
                cd "$CLONE_DIR"
                git fetch origin "$GIT_BRANCH"
                git reset --hard FETCH_HEAD
              else
                mkdir -p "$CLONE_DIR"
                git clone --branch "$GIT_BRANCH" --depth 1 "$GIT_REPO" "$CLONE_DIR"
              fi

              {{- else }}
              # No authentication (public repository)
              if [ -d "$CLONE_DIR/.git" ]; then
                echo "Repository already exists at $CLONE_DIR, pulling latest changes"
                cd "$CLONE_DIR"
                git fetch origin "$GIT_BRANCH"
                git reset --hard FETCH_HEAD
              else
                mkdir -p "$CLONE_DIR"
                git clone --branch "$GIT_BRANCH" --depth 1 "$GIT_REPO" "$CLONE_DIR"
              fi
              {{- end }}
          volumeMounts:
            - name: workspace
              mountPath: {{ .Values.persistence.mountPath }}
            {{- if .Values.httpAuth.username }}
            - name: git-http-auth
              mountPath: /etc/git-auth
              readOnly: true
            {{- else if or .Values.git.githubApp.secretName (and .Values.git.githubApp.privateKey .Values.git.githubApp.applicationId .Values.git.githubApp.installationId) }}
            - name: github-app-secret
              mountPath: /etc/github-app
              readOnly: true
            {{- else if or .Values.sshKey.privateKey .Values.sshKey.secretName }}
            - name: git-ssh
              mountPath: /etc/git-secret
              readOnly: true
            {{- end }}
        {{- end }}

        {{- with .Values.extraInitContainers }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- end }}

      containers:
        # ─── Main Oxy Container ───
        - name: {{ include "oxy-start.name" . }}
          image: "{{ .Values.app.image }}:{{ default .Chart.AppVersion .Values.app.imageTag }}"
          imagePullPolicy: {{ .Values.app.imagePullPolicy }}
          {{- if and .Values.app.command (gt (len .Values.app.command) 0) }}
          command:
            {{- range .Values.app.command }}
            - {{ . | quote }}
            {{- end }}
          {{- else }}
          command:
            - sh
            - -c
            - |
              {{- if .Values.dind.enabled }}
              # Wait for the DinD daemon to be ready
              echo "Waiting for Docker daemon..."
              timeout=120
              elapsed=0

              # Check 1: Docker daemon responds to info command
              until docker info >/dev/null 2>&1; do
                if [ $elapsed -ge $timeout ]; then
                  echo "Error: Docker daemon failed to start within ${timeout}s"
                  exit 1
                fi
                sleep 2
                elapsed=$((elapsed + 2))
              done
              echo "Docker daemon responded to 'docker info'"

              # Check 2: Verify Docker API is fully operational via version check
              echo "Verifying Docker API is fully operational..."
              until docker version >/dev/null 2>&1; do
                if [ $elapsed -ge $timeout ]; then
                  echo "Error: Docker API not fully operational within ${timeout}s"
                  exit 1
                fi
                sleep 2
                elapsed=$((elapsed + 2))
              done

              # Check 3: Give DinD extra time to fully initialize storage drivers
              echo "Allowing DinD storage initialization..."
              sleep 5

              echo "Docker daemon is fully ready."

              # Verify DOCKER_HOST is set correctly
              echo "DOCKER_HOST is set to: $DOCKER_HOST"
              echo "Testing Docker connectivity with 'docker ps'..."
              if docker ps >/dev/null 2>&1; then
                echo "✓ Docker API connection verified"
              else
                echo "✗ Warning: Docker ps failed, but proceeding anyway..."
              fi

              # Start all services via oxy start
              # This starts PostgreSQL, ClickHouse (if --enterprise), and other services
              # with opinionated defaults - no manual database URL configuration needed
              echo "Starting Oxy services..."
              oxy start{{ if .Values.oxyStart.enterprise }} --enterprise{{ end }}{{ if .Values.oxyStart.clean }} --clean{{ end }}

              {{- end }}
              # Run the main server
                exec oxy serve{{- if .Values.git.enabled }} --local{{- end }}{{- if .Values.app.internalHost }} --internal-host {{ .Values.app.internalHost }} --internal-port {{ .Values.app.internalPort }}{{- end }}
          {{- end }}
          {{- if .Values.git.enabled }}
          workingDir: {{ $workingDir }}
          {{- end }}
          ports:
            - containerPort: {{ .Values.app.port }}
              protocol: TCP
              name: traffic-port
            {{- if .Values.app.internalHost }}
            - containerPort: {{ .Values.app.internalPort }}
              protocol: TCP
              name: internal-port
            {{- end }}

          env:
            # Docker host pointing to the DinD sidecar
            {{- if .Values.dind.enabled }}
            - name: DOCKER_HOST
              value: "unix:///var/run/docker.sock"
            # Prepend the shared docker-cli binary to PATH
            - name: PATH
              value: "/docker-bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
            {{- end }}

            # State Directory
            {{- if and .Values.env.OXY_STATE_DIR (ne .Values.env.OXY_STATE_DIR "") }}
            - name: OXY_STATE_DIR
              value: {{ .Values.env.OXY_STATE_DIR | quote }}
            {{- else }}
            - name: OXY_STATE_DIR
              value: {{ printf "%s/%s" .Values.persistence.mountPath .Values.persistence.folder | quote }}
            {{- end }}

            # Additional environment variables
            {{- range $key, $value := .Values.env }}
            {{- if ne $key "OXY_STATE_DIR" }}
            {{- if ne (toString $value) "" }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
            {{- end }}
            {{- end }}

          {{- if or .Values.configMap.enabled (gt (len .Values.externalSecrets.envSecretNames) 0) }}
          envFrom:
            {{- if .Values.configMap.enabled }}
            - configMapRef:
                name: {{ include "oxy-start.fullname" . }}-config
            {{- end }}
            {{- range .Values.externalSecrets.envSecretNames }}
            - secretRef:
                name: {{ . | quote }}
            {{- end }}
          {{- end }}

          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}

          volumeMounts:
            - name: workspace
              mountPath: {{ .Values.persistence.mountPath }}
            {{- if .Values.dind.enabled }}
            - name: docker-bin
              mountPath: /docker-bin
              readOnly: true
            - name: docker-socket
              mountPath: /var/run
            {{- end }}
            {{- range $idx, $secretName := .Values.externalSecrets.envSecretNames }}
            - name: env-secret-{{ $idx }}
              mountPath: /secrets/env/{{ $secretName }}
              readOnly: true
            {{- end }}
            {{- range $idx, $fileSecret := .Values.externalSecrets.fileSecrets }}
            - name: file-secret-{{ $idx }}
              mountPath: /secrets/files/{{ $fileSecret.name }}
              readOnly: true
            {{- end }}

          {{- if .Values.dind.enabled }}
          {{- with .Values.startupProbe }}
          startupProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- end }}
          {{- with .Values.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.lifecycle }}
          lifecycle:
            {{- toYaml . | nindent 12 }}
          {{- end }}

        {{- if .Values.dind.enabled }}
        # ─── Docker-in-Docker Sidecar ───
        - name: dind
          image: "{{ .Values.dind.image }}:{{ .Values.dind.imageTag }}"
          imagePullPolicy: {{ .Values.dind.imagePullPolicy }}
          securityContext:
            privileged: true
          env:
            # Configure dockerd to listen on both Unix socket and TCP
            # Removing DOCKER_TLS_CERTDIR allows Unix socket creation
            - name: DOCKER_HOST
              value: "unix:///var/run/docker.sock"
          command:
            - dockerd
            - --host=unix:///var/run/docker.sock
            - --host=tcp://0.0.0.0:2375
            - --tls=false
          ports:
            - containerPort: 2375
              protocol: TCP
              name: docker
          volumeMounts:
            - name: dind-storage
              mountPath: /var/lib/docker
            - name: docker-socket
              mountPath: /var/run
          {{- with .Values.dind.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          readinessProbe:
            exec:
              command: ["docker", "info"]
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            exec:
              command: ["docker", "info"]
            initialDelaySeconds: 10
            periodSeconds: 30
            failureThreshold: 3
        {{- end }}

        {{- with .Values.extraSidecars }}
        {{- toYaml . | nindent 8 }}
        {{- end }}

      # ─── Volumes ───
      volumes:
        {{- if .Values.dind.enabled }}
        - name: docker-bin
          emptyDir: {}
        - name: docker-socket
          emptyDir: {}
        {{- end }}

        {{- if .Values.git.enabled }}
        {{- if .Values.httpAuth.username }}
        {{- $httpAuthSecretName := "" }}
        {{- if .Values.httpAuth.secretName }}
          {{- $httpAuthSecretName = .Values.httpAuth.secretName }}
        {{- else if .Values.httpAuth.password }}
          {{- $httpAuthSecretName = printf "%s-http-auth" (include "oxy-start.fullname" $) }}
        {{- end }}
        - name: git-http-auth
          secret:
            secretName: {{ $httpAuthSecretName }}
            defaultMode: 0400
            optional: false
            items:
              - key: {{ .Values.httpAuth.passwordKey }}
                path: password
        {{- else if or .Values.git.githubApp.secretName (and .Values.git.githubApp.privateKey .Values.git.githubApp.applicationId .Values.git.githubApp.installationId) }}
        {{- if .Values.git.githubApp.secretName }}
        - name: github-app-secret
          secret:
            secretName: {{ .Values.git.githubApp.secretName }}
            defaultMode: 0400
            optional: false
        {{- else }}
        - name: github-app-secret
          secret:
            secretName: {{ printf "%s-github-app" (include "oxy-start.fullname" $) }}
            defaultMode: 0400
            optional: false
        {{- end }}
        {{- else if or .Values.sshKey.privateKey .Values.sshKey.secretName }}
        - name: git-ssh
          secret:
            secretName: {{ default .Values.git.sshSecretName .Values.sshKey.secretName }}
            defaultMode: 0400
            optional: false
        {{- end }}
        {{- end }}

        {{- range $idx, $secretName := .Values.externalSecrets.envSecretNames }}
        - name: env-secret-{{ $idx }}
          secret:
            secretName: {{ $secretName | quote }}
            optional: true
        {{- end }}
        {{- range $idx, $fileSecret := .Values.externalSecrets.fileSecrets }}
        - name: file-secret-{{ $idx }}
          secret:
            secretName: {{ $fileSecret.name | quote }}
            optional: true
        {{- end }}

      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}

  # ─── Persistent Volume Claim Templates ───
  volumeClaimTemplates:
    - metadata:
        name: workspace
        {{- with .Values.persistence.annotations }}
        annotations:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        {{- with .Values.persistence.labels }}
        labels:
          {{- toYaml . | nindent 10 }}
        {{- end }}
      spec:
        accessModes:
          - {{ .Values.persistence.accessMode | quote }}
        {{- with .Values.persistence.storageClassName }}
        storageClassName: {{ . }}
        {{- end }}
        {{- with .Values.persistence.volumeMode }}
        volumeMode: {{ . }}
        {{- end }}
        {{- with .Values.persistence.selector }}
        selector:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.persistence.size }}
    {{- if .Values.dind.enabled }}
    - metadata:
        name: dind-storage
      spec:
        accessModes:
          - "ReadWriteOnce"
        {{- with .Values.dind.storageClassName }}
        storageClassName: {{ . }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.dind.storageSize }}
    {{- end }}
