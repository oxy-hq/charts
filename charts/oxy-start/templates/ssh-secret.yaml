{{- if .Values.git.enabled }}

{{- if or .Values.sshKey.privateKey .Values.sshKey.secretName }}
{{- $secretName := default .Values.git.sshSecretName .Values.sshKey.secretName }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "oxy-start.labels" . | nindent 4 }}
type: Opaque
data:
  {{- if .Values.sshKey.privateKey }}
  ssh: {{ .Values.sshKey.privateKey | b64enc | quote }}
  {{- end }}
  {{- if .Values.sshKey.knownHosts }}
  known_hosts: {{ .Values.sshKey.knownHosts | b64enc | quote }}
  {{- end }}
{{- end }}

{{- if and (not .Values.git.githubApp.secretName) .Values.git.githubApp.privateKey .Values.git.githubApp.applicationId .Values.git.githubApp.installationId }}
{{- $ghSecretName := printf "%s-github-app" (include "oxy-start.fullname" .) }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ $ghSecretName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "oxy-start.labels" . | nindent 4 }}
type: Opaque
data:
  {{ .Values.git.githubApp.privateKeyKey | quote }}: {{ .Values.git.githubApp.privateKey | b64enc | quote }}
  {{ .Values.git.githubApp.applicationIdKey | quote }}: {{ printf "%v" .Values.git.githubApp.applicationId | b64enc | quote }}
  {{ .Values.git.githubApp.installationIdKey | quote }}: {{ printf "%v" .Values.git.githubApp.installationId | b64enc | quote }}
{{- end }}

{{- end }}
