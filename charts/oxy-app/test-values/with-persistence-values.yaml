# Integration test with persistence enabled
nameOverride: "oxy-test-persist"
fullnameOverride: "oxy-test-persist"

app:
  image: "ghcr.io/oxy-hq/oxygen"
  imageTag: "0.5.49"
  imagePullPolicy: "IfNotPresent"
  replicaCount: 1

service:
  port: 80
  targetPort: 80

# Enable persistence for testing StatefulSet behavior
persistence:
  enabled: true
  accessMode: "ReadWriteOnce"
  size: "1Gi"
  mountPath: "/workspace"

# Environment variables
env:
  OXY_STATE_DIR: "/workspace/oxy_data"

# Resource limits for CI
resources:
  requests:
    cpu: "500m"
    memory: "512Mi"
  limits:
    cpu: "500m"
    memory: "512Mi"

# Disable external dependencies
database:
  postgres:
    enabled: true

git:
  enabled: false

externalSecrets:
  envSecretNames: []
  fileSecrets: []